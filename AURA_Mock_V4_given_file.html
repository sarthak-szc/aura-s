<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuRA — AI Discovery Framework | SenzCraft</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{
  --dk:#060E1E;--da:#0B1A35;--nv:#1A3260;--bl:#1D5FD4;--cy:#00C2E0;
  --pg:#EEF3FB;--cd:#FFF;--th:#07112B;--tb:#1C2C48;--tm:#576A8A;--tl:#97A9C4;
  --br:#D8E3F2;--ok:#0AB472;--wn:#F0A500;--dn:#E03A3A;--pu:#7C3AED;
  --sbw:258px;--sbc:64px;--hh:60px;
  --rs:6px;--rm:10px;--rl:16px;
  --ss:0 1px 4px rgba(7,17,43,.07);--sm:0 4px 14px rgba(7,17,43,.10);--sl:0 8px 28px rgba(7,17,43,.14);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--pg);color:var(--tb);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4,h5,h6{font-family:'Sora',sans-serif;color:var(--th)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--br);border-radius:4px}
img{display:block}

/* ─── FORMS ─── */
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tm);margin-bottom:5px}
label.req::after{content:' *';color:var(--dn)}
.fc{width:100%;padding:9px 13px;border:1.5px solid var(--br);border-radius:var(--rm);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--th);background:var(--cd);outline:none;transition:border-color .2s,box-shadow .2s}
.fc:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(29,95,212,.10)}
textarea.fc{resize:vertical;min-height:72px}
.fc-ro{background:#F4F7FD;color:var(--tm);pointer-events:none}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.ht{font-size:11px;color:var(--tl);margin-top:4px}

/* ─── CURRENCY FIELD ─── */
.curr-select-wrap{position:relative}
.curr-flag{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
.fc-curr{padding-left:36px!important;font-weight:600}
.curr-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(29,95,212,.08);border:1px solid rgba(29,95,212,.2);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;color:var(--bl)}
.curr-hint{font-size:11px;color:var(--tm);margin-top:5px;padding:8px 10px;background:#F0F7FF;border-radius:6px;border-left:3px solid var(--bl)}

/* ─── TAGS ─── */
.sys-tag{display:inline-flex;align-items:center;background:rgba(29,95,212,.1);border:1px solid rgba(29,95,212,.25);color:var(--bl);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;white-space:nowrap}
.tag-suggest-item{padding:9px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--br)}
.tag-suggest-item:last-child{border-bottom:none}
.tag-suggest-item:hover{background:var(--pg)}
.tag-suggest-new{color:var(--bl);font-weight:600}

/* ─── GOAL ROWS ─── */
.goal-row input:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(29,95,212,.10)}

/* ─── NUMERIC UNIT ─── */
.num-wrap{display:flex;gap:0}
.num-wrap input{border-radius:var(--rm) 0 0 var(--rm);border-right:none;flex:1}
.num-wrap input:focus{z-index:1}
.num-unit{padding:9px 11px;background:#F5F8FD;border:1.5px solid var(--br);border-radius:0 var(--rm) var(--rm) 0;font-size:12px;font-weight:600;color:var(--tm);white-space:nowrap;display:flex;align-items:center}
.num-unit select{background:transparent;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--tm);cursor:pointer}

/* ─── ARCHETYPE CARDS ─── */
.arch-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.arch-card{border:1.5px solid var(--br);border-radius:var(--rm);padding:14px 16px;transition:all .16s;cursor:default;background:#fff}
.arch-card:hover{border-color:rgba(29,95,212,.3);box-shadow:var(--sm)}
.arch-card.selected{border-color:var(--bl);background:rgba(29,95,212,.04)}
.arch-card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.arch-card-title{font-size:13px;font-weight:700;color:var(--th)}
.arch-card-body{font-size:12px;color:var(--tm);line-height:1.5}
.arch-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--br);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;flex-shrink:0;transition:all .14s}
.arch-check.on{background:var(--bl);border-color:var(--bl);color:#fff}
.tech-stack-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:0}
.tech-chip{background:#F6F9FD;border:1px solid var(--br);border-radius:8px;padding:10px 12px}
.tech-chip-lbl{font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--tm);margin-bottom:4px}
.tech-chip-val{font-size:12px;color:var(--th)}

/* ─── GSDA COMPACT ─── */
.gsda-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.gsda-section{border:1px solid var(--br);border-radius:var(--rm);overflow:hidden;background:#fff}
.gsda-hdr{padding:9px 13px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--br)}
.gsda-hdr h5{font-size:12px;font-weight:700}
.gsda-body{padding:8px 12px}
.gsda-item{display:flex;align-items:flex-start;gap:7px;padding:5px 0;border-bottom:1px solid var(--br);font-size:12px;line-height:1.4}
.gsda-item:last-child{border-bottom:none}
.gsda-num{width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;margin-top:1px;color:#fff}
.gsda-auto-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:linear-gradient(135deg,#F8FAFD,#F0F7FF);border-top:1px solid var(--br);flex-wrap:wrap}
.gsda-auto-lbl{font-size:11px;font-weight:700;color:var(--tm);white-space:nowrap}
.yes-no{display:flex;gap:4px}
.yn-btn{padding:4px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--br);background:#fff;color:var(--tm);transition:all .14s}
.yn-btn.yes.on{background:#E8FBF3;border-color:#6EE7B7;color:#065F46}
.yn-btn.no.on{background:#FEF2F2;border-color:#FECACA;color:#991B1B}
.pct-wrap{display:flex;align-items:center;gap:5px}
.pct-wrap input{width:64px;padding:4px 8px;border:1.5px solid var(--br);border-radius:6px;font-size:13px;font-weight:700;text-align:center;outline:none;font-family:'DM Sans',sans-serif}
.pct-wrap input:focus{border-color:var(--bl)}

/* ─── BUTTONS ─── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--rm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .18s;line-height:1;white-space:nowrap}
.bp{background:var(--bl);color:#fff}.bp:hover{background:#1750be;box-shadow:0 4px 12px rgba(29,95,212,.32);transform:translateY(-1px)}
.bs{background:var(--cd);color:var(--tb);border:1.5px solid var(--br)}.bs:hover{background:var(--pg)}
.bo{background:transparent;color:var(--bl);border:1.5px solid var(--bl)}.bo:hover{background:rgba(29,95,212,.05)}
.bai{background:linear-gradient(135deg,#5C4FD6,var(--cy));color:#fff}.bai:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 14px rgba(92,79,214,.38)}
.bok{background:var(--ok);color:#fff}.bok:hover{background:#099d63}
.bdn{background:var(--dn);color:#fff}
.bwn{background:var(--wn);color:#fff}
.bsm{padding:6px 13px;font-size:12px}
.bfl{width:100%;justify-content:center}
.bdanger{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA}

/* ─── SHELL ─── */
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sbw);background:linear-gradient(175deg,var(--dk) 0%,var(--da) 55%,var(--nv) 100%);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:200;transition:width .28s cubic-bezier(.4,0,.2,1);overflow:hidden}
.sidebar.col{width:var(--sbc)}
.sb-logo{padding:16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.07);min-height:var(--hh);flex-shrink:0}
.sb-logo img{height:28px;flex-shrink:0;filter:brightness(0) invert(1)}
.lt .an{font-family:'Sora',sans-serif;font-size:16px;font-weight:800;color:#fff;white-space:nowrap;letter-spacing:-.5px}
.lt .an span{color:var(--cy)}
.lt .at{font-size:9px;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:1.4px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-sec{font-size:9px;text-transform:uppercase;letter-spacing:1.4px;color:rgba(255,255,255,.25);padding:0 9px;margin:14px 0 4px}
.ni{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:8px;cursor:pointer;transition:all .14s;color:rgba(255,255,255,.55);font-size:13px;font-weight:500;margin-bottom:2px;white-space:nowrap}
.ni:hover{background:rgba(255,255,255,.08);color:#fff}
.ni.active{background:rgba(29,95,212,.3);color:#fff;border:1px solid rgba(29,95,212,.4)}
.ni-ico{font-size:15px;flex-shrink:0;width:20px;text-align:center}
.ni-badge{margin-left:auto;background:var(--cy);color:var(--dk);border-radius:10px;padding:1px 7px;font-size:9px;font-weight:800}
.sb-foot{padding:14px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0}
.uc{display:flex;align-items:center;gap:10px}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;color:#fff}
.un{font-size:12px;font-weight:600;color:#fff}
.ur{font-size:10px;color:var(--cy)}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{height:var(--hh);background:var(--cd);border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100;box-shadow:var(--ss)}
.tbl-l{display:flex;align-items:center;gap:12px}
.ham{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:var(--rs);cursor:pointer;color:var(--tm);font-size:16px;transition:background .14s}
.ham:hover{background:var(--pg)}
.pg-t{font-family:'Sora',sans-serif;font-size:15px;font-weight:700;color:var(--th)}
.tbl-r{display:flex;align-items:center;gap:8px}
.rp{display:flex;align-items:center;gap:6px;background:var(--pg);border:1px solid var(--br);border-radius:20px;padding:4px 12px 4px 8px;font-size:12px;color:var(--tm);cursor:pointer;transition:background .14s}
.rp:hover{background:#e4ecf7}
.rd{width:8px;height:8px;border-radius:50%}
.content{flex:1;padding:26px;overflow-x:hidden}

/* ─── KPI ─── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.kpi{background:var(--cd);border-radius:var(--rl);padding:20px 22px;box-shadow:var(--ss);border:1px solid var(--br);transition:box-shadow .2s}
.kpi:hover{box-shadow:var(--sm)}
.kpi-iw{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;margin-bottom:12px}
.kpi-l{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--tm);font-weight:600;margin-bottom:5px}
.kpi-v{font-family:'Sora',sans-serif;font-size:32px;font-weight:800;color:var(--th);line-height:1}
.kpi-s{font-size:11px;color:var(--ok);margin-top:5px}

/* ─── STATUS LEGEND ─── */
.stleg{background:#F8FAFD;border:1px solid var(--br);border-radius:var(--rm);padding:14px 18px;margin-bottom:18px}
.stleg-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tm);margin-bottom:10px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.stleg-rows{display:flex;gap:20px;flex-wrap:wrap}
.stleg-row{display:flex;align-items:flex-start;gap:8px;flex:1;min-width:200px}

/* ─── STATUS PILL ─── */
.sp{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid}
.sp-ok{background:#E8FBF3;color:#065F46;border-color:#6EE7B7}
.sp-ip{background:#EBF1FF;color:#1D40AE;border-color:#93C5FD}
.sp-dr{background:#F8F9FA;color:#475569;border-color:#CBD5E1}

/* ─── PROGRESS BAR ─── */
.pbw{background:var(--pg);border-radius:99px;height:6px;width:80px;overflow:hidden}
.pbf{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--bl),var(--cy))}

/* ─── TABLE ─── */
.tbl-wrap{background:var(--cd);border-radius:var(--rl);border:1px solid var(--br);box-shadow:var(--ss);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{padding:11px 16px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--tm);background:#F5F8FD;border-bottom:1px solid var(--br)}
tbody tr{border-bottom:1px solid var(--br);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#F9FBFE}
tbody td{padding:12px 16px;font-size:13px;color:var(--tb)}
.tacts{display:flex;gap:4px}
.tact{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--tm);transition:background .13s}
.tact:hover{background:var(--pg)}
.tact.del:hover{background:#FEF2F2;color:var(--dn)}
.pag{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-top:1px solid var(--br)}
.pag-i{font-size:11px;color:var(--tm)}
.pag-b{display:flex;gap:3px}
.pbn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:1px solid var(--br);cursor:pointer;font-size:12px;color:var(--tm);background:#fff}
.pbn.on{background:var(--bl);color:#fff;border-color:var(--bl)}
.pbn:hover:not(.on){background:var(--pg)}

/* ─── BADGE ─── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700}
.b-ok{background:#E8FBF3;color:#065F46}
.b-ip{background:#EBF1FF;color:#1D40AE}
.b-dr{background:#F1F5F9;color:#475569}
.b-pu{background:#F5F3FF;color:#5B21B6}
.b-wn{background:#FFFBEB;color:#92400E}

/* ─── SECTION HEADER ─── */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sh h3{font-size:15px;font-weight:700}
.sh-acts{display:flex;gap:8px}
.sf-bar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.sw{position:relative;flex:1;min-width:200px;max-width:320px}
.sw input{padding-left:34px}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--tl);font-size:13px}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--br);background:var(--cd);color:var(--tm);transition:all .14s}
.chip.on,.chip:hover{border-color:var(--bl);color:var(--bl);background:rgba(29,95,212,.06)}

/* ─── PAGE HEADER ─── */
.ph{margin-bottom:20px}
.ph h2{font-size:20px;font-weight:700}
.ph p{font-size:12px;color:var(--tm);margin-top:3px}

/* ─── CARDS ─── */
.fcard{background:var(--cd);border-radius:var(--rl);padding:24px;border:1px solid var(--br);box-shadow:var(--ss);margin-bottom:14px}
.fcard h4{font-size:13px;font-weight:700;padding-bottom:12px;margin-bottom:16px;border-bottom:1px solid var(--br)}
.fcard-hdr{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;margin-bottom:16px;border-bottom:1px solid var(--br)}
.fcard-hdr h4{font-size:13px;font-weight:700}
.sub-box{background:#F6F9FD;border-radius:8px;padding:14px 16px;margin-bottom:14px}
.sblbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--tm);margin-bottom:10px}
.divider{height:1px;background:var(--br);margin:16px 0}
.sec-div{font-size:10px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.6px;margin:16px 0 10px}

/* ─── INFO BANNERS ─── */
.ib{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.ib-ai{background:#F5F3FF;border:1px solid #DDD6FE;color:#5B21B6}
.ib-w{background:#FFFBEB;border:1px solid #FDE68A;color:#92400E}
.ib-b{background:#EBF1FF;border:1px solid #BFDBFE;color:#1E40AF}
.ib-ok{background:#E8FBF3;border:1px solid #6EE7B7;color:#065F46}
.ib-lock{background:#F5F8FD;border:1px solid #CBD5E1;color:#475569}

/* ─── WIZARD ─── */
.wiz-card{background:var(--cd);border-radius:var(--rl);padding:20px 26px;margin-bottom:18px;border:1px solid var(--br);box-shadow:var(--ss)}
.wiz-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.wiz-meta h3{font-size:15px;font-weight:700}
.wiz-meta p{font-size:11px;color:var(--tm);margin-top:2px}
.wiz-prog{font-size:11px;color:var(--bl);font-weight:600;margin-top:2px}
.steps-wrap{overflow-x:auto;padding-bottom:4px}
.steps{display:flex;align-items:flex-start;min-width:600px}
.step{display:flex;align-items:flex-start;flex:1}
.step-b{display:flex;flex-direction:column;align-items:center;gap:5px}
.sn{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-size:11px;font-weight:700;transition:all .2s;flex-shrink:0}
.sn-done{background:var(--ok);color:#fff}
.sn-act{background:var(--bl);color:#fff;box-shadow:0 0 0 5px rgba(29,95,212,.16)}
.sn-pend{background:var(--pg);color:var(--tl);border:2px solid var(--br)}
.slbl{font-size:9px;font-weight:500;color:var(--tm);text-align:center;max-width:60px;line-height:1.3}
.slbl.act{color:var(--bl);font-weight:700}
.sline{flex:1;height:2px;background:var(--br);margin:15px 3px 0;border-radius:2px;min-width:20px}
.sline.done{background:var(--ok)}

/* ─── UPLOAD ─── */
.uzone{border:2px dashed var(--br);border-radius:var(--rm);padding:24px;text-align:center;cursor:pointer;transition:all .2s}
.uzone:hover{border-color:var(--bl);background:rgba(29,95,212,.03)}
.uzone p{font-size:12px;color:var(--tm);margin-top:6px}
.browse{color:var(--bl);font-weight:600}
.ufile{display:flex;align-items:center;gap:8px;margin-top:8px;padding:8px 12px;background:#EEF5FF;border-radius:8px;font-size:12px}

/* ─── RICH TEXT ─── */
.rt-bar{display:flex;gap:3px;padding:5px 8px;border:1.5px solid var(--br);border-bottom:none;border-radius:var(--rs) var(--rs) 0 0;background:#F5F8FD}
.rt-bar button{padding:3px 8px;border:1px solid var(--br);border-radius:4px;background:#fff;font-size:11px;cursor:pointer;color:var(--tm);font-family:'DM Sans',sans-serif}
.rt-bar button:hover{background:var(--pg)}
.rt-ta{border-radius:0 0 var(--rs) var(--rs)!important}

/* ─── ACTIVITY TABLE ─── */
.atw{overflow-x:auto}
.atw table{min-width:900px}
.atw td .fc{font-size:12px;padding:5px 8px}
.atw td textarea.fc{min-height:44px}
.add-row{display:flex;align-items:center;gap:6px;padding:10px 15px;color:var(--bl);font-size:12px;font-weight:600;cursor:pointer;border-top:1px solid var(--br)}
.add-row:hover{background:rgba(29,95,212,.04)}

/* ─── ACCORDION ─── */
.acc{border:1px solid var(--br);border-radius:var(--rm);margin-bottom:9px;overflow:hidden}
.acc-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;background:#F6F9FD;transition:background .13s;user-select:none}
.acc-hdr:hover{background:#EEF3FB}

function updateClient(id) {

function deleteClient(id) {
  const c = DB.clients.find(x=>x.id===id); if(!c) return;
  if(c.count > 0) { toast(`Cannot delete — "${c.co}" has ${c.count} active assessment(s)`,'w'); return; }
  S.modal='confirm';
  S.modalData={
    title:'Delete Client?',
    msg:`"${c.co}" will be permanently removed from the client master. This cannot be undone.`,
    btnCls:'bdn', btnLbl:'🗑 Delete',
    action:`DB.clients=DB.clients.filter(x=>x.id!==${id});draw();toast('Client deleted successfully','ok')`
  };
  draw();
}

function startAssess() {
  const client = document.getElementById('nf_cl').value;
  const fn = document.getElementById('nf_fn').value;
  const area = document.getElementById('nf_ar').value;
  const currency = document.getElementById('nf_cu').value;
  if(!client) { toast('Please select a client','w'); return; }
  const sym = CURRENCIES.find(c=>c.code===currency)?.sym||'₹';
  const a = {id:DB.nextAid++,client,area:fn,process:`${area} Process`,date:fmtDate(),status:'Draft',pct:5,step:1,currency,sym};
  DB.assessments.unshift(a);
  S.currCode = currency; S.currSym = sym;
  S.modal=null; draw();
  toast(`Assessment created for "${client}" — ${currency} ${sym}`);
  setTimeout(()=>go('discovery',{step:1}),800);
}

/* ═══════════════════════════════════════════
   WIZARD HEADER
═══════════════════════════════════════════ */
function wizHead(cur) {
  const STEPS=['Customer\nDetails','Process\nDetails','Volumetrics','Activity\nBreakdown','GSDA\nEvaluation','AI\nArchetypes','Evaluation\nSummary'];
  const pct=[0,15,28,42,57,71,85,100];
  let h=`<div class="wiz-card">
    <div class="wiz-meta">
      <div><h3>Process Discovery Assessment</h3>
        <p>Step ${cur} of 7 — ${STEPS[cur-1].replace('\n',' ')}</p>
        <div class="wiz-prog">Step completion: ${pct[cur]}% <span style="color:var(--tl)">· Currency: </span><span class="curr-badge" style="font-size:10px">${S.currSym||'₹'} ${S.currCode||'INR'}</span></div>
      </div>
      <button class="btn bs bsm" onclick="go('dashboard')">✕ Exit</button>
    </div>
    <div class="steps-wrap"><div class="steps">`;
  STEPS.forEach((s,i)=>{
    const n=i+1,cls=n<cur?'sn-done':n===cur?'sn-act':'sn-pend',lbl=n===cur?'slbl act':'slbl';
    h+=`<div class="step"><div class="step-b"><div class="sn ${cls}">${n<cur?'✓':n}</div><div class="${lbl}">${s.replace('\n','<br>')}</div></div>${n<7?`<div class="sline ${n<cur?'done':''}"></div>`:''}</div>`;
  });
  return h+`</div></div></div>`;
}

          <td><div class="tacts">

function aiSim(id) {
  const el=document.getElementById(id); if(!el)return;
  const orig=el.innerHTML;
  el.innerHTML=`<div style="padding:44px;display:flex;flex-direction:column;align-items:center;gap:14px">
    <div class="ai-ld"><div class="spin"></div>✨ AI is analysing your document and extracting process details...</div>
    <p style="font-size:12px;color:var(--tm)">This may take a few moments</p>
  </div>`;
  setTimeout(()=>{ el.innerHTML=orig; toast('✨ AI has populated all available fields from your document!'); }, 2400);
}

function draw() {
  const app=document.getElementById('app');
  if(S.screen==='login'){app.innerHTML=loginHTML();return;}
  const pages={dashboard:dashHTML,clients:clientsHTML,reports:reportsHTML,admin:adminHTML};
  if(pages[S.screen]){app.innerHTML=pages[S.screen]();return;}
  if(S.screen==='discovery'){
    const m=[null,s1HTML,s2HTML,s3HTML,s4HTML,s5HTML,s6HTML,s7HTML];
    app.innerHTML=(m[S.step]||s1HTML)();return;
  }
  app.innerHTML=dashHTML();
}

/* ═══════════════════════════════════════════
   HELPER FUNCTIONS — Goals, Tags, Archetypes
═══════════════════════════════════════════ */
function handleFreqChange(){const s=document.getElementById('procFreq'),w=document.getElementById('adhocWrap');if(s&&w)w.style.display=s.value==='Ad-hoc'?'block':'none';}
function addGoal(){const list=document.getElementById('goalsList');if(!list)return;const count=list.querySelectorAll('.goal-row').length+1;const row=document.createElement('div');row.className='goal-row';row.style.cssText='display:flex;align-items:center;gap:6px';row.innerHTML=`<span style="width:20px;height:20px;border-radius:50%;background:var(--bl);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${count}</span><input class="fc" style="flex:1" placeholder="Enter goal or outcome..."><div class="tact del" onclick="removeGoal(this)" title="Remove">✕</div>`;list.appendChild(row);row.querySelector('input').focus();}
function removeGoal(btn){const row=btn.closest('.goal-row');if(!row)return;const list=row.parentElement;row.remove();list.querySelectorAll('.goal-row span:first-child').forEach((s,i)=>s.textContent=i+1);}
const SYS_MASTER=['SAP S/4HANA','SAP ECC','Oracle ERP','Microsoft Dynamics','Salesforce','ServiceNow','Workday','Microsoft Outlook','SharePoint','Teams','Excel','Power BI','Power Automate','Jira','Confluence','Esker','Coupa','Ariba','Concur','DocuSign','Zendesk','Freshservice','Monday.com','Asana','Slack'];
function handleTagKey(e){if(e.key==='Enter'||e.key===','){e.preventDefault();const val=e.target.value.trim().replace(/,$/,'');if(val)addTag(val);e.target.value='';hideTagSuggest();}}
function addTag(val){const c=document.getElementById('tagContainer'),inp=document.getElementById('tagInput');if(!c||!inp)return;const ex=[...c.querySelectorAll('.sys-tag')].map(t=>t.textContent.replace('✕','').trim());if(ex.includes(val))return;const tag=document.createElement('span');tag.className='sys-tag';tag.innerHTML=`${val} <span onclick="removeTag(this)" style="cursor:pointer;margin-left:4px;opacity:.6">✕</span>`;c.insertBefore(tag,inp);}
function removeTag(x){x.closest('.sys-tag').remove();}
function showTagSuggest(val){const box=document.getElementById('tagSuggest'),inp=document.getElementById('tagInput');if(!box||!inp||!val){hideTagSuggest();return;}const matches=SYS_MASTER.filter(s=>s.toLowerCase().includes(val.toLowerCase())).slice(0,6);if(!matches.length&&val.length<2){hideTagSuggest();return;}const items=matches.map(m=>`<div class="tag-suggest-item" onmousedown="addTag('${m}');document.getElementById('tagInput').value='';hideTagSuggest()">${m}</div>`).join('');const newItem=!SYS_MASTER.some(s=>s.toLowerCase()===val.toLowerCase())?`<div class="tag-suggest-item tag-suggest-new" onmousedown="addTag('${val}');document.getElementById('tagInput').value='';hideTagSuggest()">＋ Add "${val}"</div>`:'';box.innerHTML=items+newItem;const cr=document.getElementById('tagContainer')?.getBoundingClientRect();if(cr)box.style.cssText=`display:block;position:fixed;left:${cr.left}px;top:${cr.bottom+4}px;width:${cr.width}px;background:#fff;border:1.5px solid var(--br);border-radius:var(--rm);box-shadow:var(--sm);z-index:9000`;}
function hideTagSuggest(){const box=document.getElementById('tagSuggest');if(box)box.style.display='none';}
// GSDA item helpers — add, update (inline edit), delete
function addGSDAItem(k) {
  GSDA[k].push('');
  draw();
  // Focus the new input after render
  setTimeout(() => {
    const body = document.getElementById('gbody_' + k);
    if (!body) {
      // fallback: find all inputs in gsda-body sections and focus last one for this section
      const allBodies = document.querySelectorAll('.gsda-body');
      const kMap = {goals:0, signals:1, decisions:2, actions:3};
      const b = allBodies[kMap[k]];
      if (b) { const inputs = b.querySelectorAll('input'); if(inputs.length) inputs[inputs.length-1].focus(); }
      return;
    }
    const inputs = body.querySelectorAll('input');
    if (inputs.length) inputs[inputs.length - 1].focus();
  }, 50);
}

function updateGSDA(k, i, val) {
  if (GSDA[k]) GSDA[k][i] = val;
}

function deleteGSDAItem(k, i) {
  if (!GSDA[k]) return;
  GSDA[k].splice(i, 1);
  draw();
}

function toggleArchById(id,el){const a=ARCHETYPES.find(x=>x.id===id);if(!a)return;a.on=!a.on;el.classList.toggle('on');el.textContent=a.on?'✓':'';el.closest('.arch-card').classList.toggle('selected',a.on);}

// File upload handlers
function handleFileSelect(input){const list=document.getElementById('fileList');if(!list||!input.files.length)return;[...input.files].forEach(file=>{const sizeMB=(file.size/(1024*1024)).toFixed(1);const ext=file.name.split('.').pop().toUpperCase();const clr={PDF:'#E03A3A',DOCX:'#1D5FD4',PPTX:'#F0A500'}[ext]||'#576A8A';const row=document.createElement('div');row.className='ufile';row.innerHTML=`<span style="background:${clr}20;color:${clr};border-radius:4px;padding:2px 6px;font-size:10px;font-weight:700">${ext}</span><strong style="flex:1">${file.name}</strong><span style="color:var(--tl)">${sizeMB} MB</span><span class="badge b-ip" style="margin-left:6px">Pending upload</span><div class="tact del" onclick="removeFile(this)" title="Remove" style="margin-left:6px">✕</div>`;list.appendChild(row);});input.value='';}

function removeFile(btn){btn.closest('.ufile').remove();const list=document.getElementById('fileList'),wrap=document.getElementById('uploadBtnWrap');if(list&&wrap&&list.querySelectorAll('.ufile').length===0)wrap.style.display='none';}

function uploadFiles(){const list=document.getElementById('fileList'),btn=document.getElementById('uploadBtn'),stat=document.getElementById('uploadStatus');if(!list)return;const pending=list.querySelectorAll('.b-ip');if(!pending.length){toast('No new files to upload','w');return;}btn.disabled=true;btn.innerHTML='<span class="spin" style="width:13px;height:13px;border-width:2px;margin-right:4px"></span> Uploading...';if(stat)stat.textContent='';let done=0;pending.forEach((badge,i)=>{setTimeout(()=>{badge.className='badge b-ok';badge.textContent='✓ Uploaded';done++;if(done===pending.length){btn.disabled=false;btn.innerHTML='⬆️ Upload Files';if(stat)stat.textContent=`✓ ${done} file${done>1?'s':''} uploaded successfully`;toast(`${done} file${done>1?'s':''} uploaded successfully!`);setTimeout(()=>{if(stat)stat.textContent='';},4000);}},800+i*500);});}

draw();
</script>
